title: "CLDMT 智能计算与系统工程平台"
description: "聚焦 AI、大模型、机器人与芯片系统的工程化落地"
url: "https://www.cldmt.com"
baseurl: ""
permalink: pretty

blog_url: "/blog/"

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "blog/Anlogic/"
    values:
      layout: "article"
      column: "Anlogic 技术专栏"
      column_url: "/blog/Anlogic/"
  - scope:
      path: "blog/Xilinx/"
    values:
      layout: "article"
      column: "Xilinx 技术专栏"
      column_url: "/blog/Xilinx/"
  - scope:
      path: "blog/wtmec/"
    values:
      layout: "article"
      column: "WTMEC 产品方案"
      column_url: "/blog/wtmec/"