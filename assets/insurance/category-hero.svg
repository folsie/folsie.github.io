<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">保险分类主题图</title>
  <desc id="desc">展示分类卡片和保障结构的抽象插画</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111225"/>
      <stop offset="55%" stop-color="#2b1733"/>
      <stop offset="100%" stop-color="#10333a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="130" r="160" fill="#ff80ab" opacity=".16"/>
  <circle cx="280" cy="780" r="210" fill="#7bd389" opacity=".12"/>
  <g transform="translate(180 160)">
    <rect width="420" height="220" rx="28" fill="#221832" stroke="#ff80ab" stroke-opacity=".28"/>
    <text x="46" y="84" fill="#fff4fb" font-size="44" font-family="Segoe UI, Microsoft YaHei, sans-serif">分类框架</text>
    <text x="46" y="134" fill="#f5bed2" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif">人身保险 / 非人身保险</text>
    <text x="46" y="174" fill="#f5bed2" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif">医疗 / 重疾 / 意外 / 寿险 / 年金</text>
  </g>
  <g transform="translate(760 185)">
    <rect width="250" height="150" rx="24" fill="#102c2e" stroke="#7bd389" stroke-opacity=".28"/>
    <text x="50" y="88" fill="#eaffef" font-size="36" font-family="Segoe UI, Microsoft YaHei, sans-serif">医疗险</text>
  </g>
  <g transform="translate(1040 185)">
    <rect width="250" height="150" rx="24" fill="#2d1d34" stroke="#ff80ab" stroke-opacity=".3"/>
    <text x="50" y="88" fill="#fff1f7" font-size="36" font-family="Segoe UI, Microsoft YaHei, sans-serif">重疾险</text>
  </g>
  <g transform="translate(760 370)">
    <rect width="250" height="150" rx="24" fill="#2a2a18" stroke="#ffd166" stroke-opacity=".3"/>
    <text x="50" y="88" fill="#fff8dc" font-size="36" font-family="Segoe UI, Microsoft YaHei, sans-serif">意外险</text>
  </g>
  <g transform="translate(1040 370)">
    <rect width="250" height="150" rx="24" fill="#1c2438" stroke="#67c3ff" stroke-opacity=".3"/>
    <text x="50" y="88" fill="#eef7ff" font-size="36" font-family="Segoe UI, Microsoft YaHei, sans-serif">寿险</text>
  </g>
  <g transform="translate(900 555)">
    <rect width="250" height="150" rx="24" fill="#18301c" stroke="#7bd389" stroke-opacity=".3"/>
    <text x="64" y="88" fill="#edfff1" font-size="36" font-family="Segoe UI, Microsoft YaHei, sans-serif">年金险</text>
  </g>
</svg>
