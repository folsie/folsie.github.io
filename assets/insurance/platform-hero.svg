<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">保险平台主题图</title>
  <desc id="desc">展示保险公司、平台与服务网络的抽象插画</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1327"/>
      <stop offset="50%" stop-color="#1d2440"/>
      <stop offset="100%" stop-color="#0f3027"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1240" cy="190" r="180" fill="#67c3ff" opacity=".12"/>
  <circle cx="340" cy="760" r="220" fill="#7bd389" opacity=".12"/>
  <g stroke="#7bd389" stroke-opacity=".35" stroke-width="8" fill="none">
    <path d="M300 250 L800 170 L1290 290"/>
    <path d="M300 250 L520 610 L1100 650"/>
    <path d="M800 170 L820 520"/>
    <path d="M1290 290 L1100 650"/>
  </g>
  <g fill="#101d29" stroke="#d7e8ff" stroke-opacity=".18">
    <circle cx="300" cy="250" r="110"/>
    <circle cx="800" cy="170" r="110"/>
    <circle cx="1290" cy="290" r="110"/>
    <circle cx="520" cy="610" r="110"/>
    <circle cx="820" cy="520" r="110"/>
    <circle cx="1100" cy="650" r="110"/>
  </g>
  <g fill="#f5fbff" font-family="Segoe UI, Microsoft YaHei, sans-serif" text-anchor="middle">
    <text x="300" y="262" font-size="36">保险公司</text>
    <text x="800" y="182" font-size="36">互联网平台</text>
    <text x="1290" y="302" font-size="36">银行渠道</text>
    <text x="520" y="622" font-size="36">经代机构</text>
    <text x="820" y="532" font-size="36">顾问服务</text>
    <text x="1100" y="662" font-size="36">长期维护</text>
  </g>
</svg>
