      <stop offset="100%" stop-color="#1d2440"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7bd389"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="160" r="180" fill="#7bd389" opacity=".15"/>
  <circle cx="280" cy="740" r="220" fill="#67c3ff" opacity=".10"/>
  <rect x="110" y="130" width="1380" height="640" rx="36" fill="#0d1b23" opacity=".74" stroke="#5ed18a" stroke-opacity=".18"/>
  <g opacity=".16">
    <path d="M160 620H1440" stroke="#d7fff0" stroke-width="4"/>
    <path d="M160 510H1440" stroke="#d7fff0" stroke-width="4"/>
    <path d="M160 400H1440" stroke="#d7fff0" stroke-width="4"/>
    <path d="M160 290H1440" stroke="#d7fff0" stroke-width="4"/>
