    <text x="250" y="270" fill="#f6fff8" font-size="36" font-family="Segoe UI, Microsoft YaHei, sans-serif">收益率观察</text>
    <text x="250" y="315" fill="#ccefd5" font-size="24" font-family="Segoe UI, Microsoft YaHei, sans-serif">利率变化 · 定价环境 · 分红实现率</text>
